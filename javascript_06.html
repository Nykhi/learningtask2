<!DOCTYPE html>
<html>
    <head>
        <title>.: javascript 06 :.</title>
        <style type="text/text/css">
            .image-container
            {
                display: none;
            }
        </style>
        <script>
            function setVisibility(value) {
                document.getElementById("nba-logo").style.display = value;
            }
        </script>
    </head>
    <body>
        <div class="image-container" id="nba-logo">
            <img src="nba-logo.jpg" width="30%" />
        </div>
        [ <a href="javascript:void(0)" onClick="return setVisibility('block')">Display image</a> | 
          <a href="javascript:void(0)" onClick="return setVisibility('none')">Hide image</a> ]
    </body>
</html>
